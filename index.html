<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Bản Đồ Thửa Đất</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .popup-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
        }
        .popup-table td {
            padding: 4px 6px;
            border-bottom: 1px solid #ddd;
        }
        .popup-value {
            color: #1a73e8;
            word-break: break-word;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS & WKT Parser -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/wicket@1.3.8/wicket.js"></script>

    <script>
    // =========================================================================
    // 1. CẤU HÌNH KHỞI TẠO BẢN ĐỒ
    // =========================================================================
    var webAppUrl = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE"; // Thay URL Apps Script của bạn tại đây

    var map = L.map('map').setView([10.762622, 106.660172], 13); // Tọa độ trung tâm mặc định
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var tatCaLayerThuaDat = [];

    // =========================================================================
    // 2. TẢI VÀ HIỂN THỊ RANH GIỚI HÀNH CHÍNH (PHƯỜNG HÒA THÀNH)
    // =========================================================================
    function createSvgLabel(centerLatLng, labelText) {
        var myIcon = L.divIcon({
            className: 'custom-ward-label',
            html: '<div style="color: #007bff; font-weight: bold; text-shadow: 1px 1px 2px white; white-space: nowrap;">' + labelText + '</div>',
            iconSize: [100, 20],
            iconAnchor: [50, 10]
        });
        return L.marker(centerLatLng, { icon: myIcon, interactive: false });
    }

    function addWardToList(id, name, groupLayer) {
        groupLayer.addTo(map);
    }

    // Tải file ranh giới GeoJSON Phường Hòa Thành
    fetch('hoa-thanh.geojson')
        .then(response => response.json())
        .then(data => {
            var subGroup = L.layerGroup();
            var layerGeo = L.geoJSON(data, {
                style: { color: "#007bff", weight: 3.5, opacity: 0.9, fillColor: "#007bff", fillOpacity: 0.05, interactive: false }
            }).addTo(subGroup);

            var bounds = layerGeo.getBounds();
            var labelSvg = createSvgLabel(bounds.getCenter(), 'PHƯỜNG HÒA THÀNH');
            labelSvg.addTo(subGroup);

            subGroup.getBounds = function() { return bounds; };
            addWardToList('hoa-thanh', 'Phường Hòa Thành', subGroup);
        })
        .catch(err => console.error("Chưa đọc được file hoa-thanh.geojson:", err));

    // =========================================================================
    // 3. CÁC HÀM HỖ TRỢ XỬ LÝ DỮ LIỆU BẢN ĐỒ
    // =========================================================================
    function wktToCoords(wktString) {
        var wkt = new Wkt.Wkt();
        wkt.read(wktString);
        var obj = wkt.toObject();
        if (obj && obj.getLatLngs) {
            return obj.getLatLngs();
        }
        return [];
    }

    function getMauTheoLoaiDat(loaiDat) {
        if (!loaiDat) return { color: "#3388ff", fillColor: "#3388ff" };
        var l = loaiDat.toUpperCase();
        if (l.includes("ONT") || l.includes("ODT")) return { color: "#ff0000", fillColor: "#ff4d4d" };
        if (l.includes("CLN") || l.includes("NTS")) return { color: "#ff9900", fillColor: "#ffcc00" };
        if (l.includes("LUC") || l.includes("LUK")) return { color: "#009933", fillColor: "#33cc33" };
        return { color: "#3388ff", fillColor: "#3388ff" };
    }

    function formatDienTich(val) {
        if (!val && val !== 0) return "";
        return Number(val).toLocaleString('vi-VN') + " m²";
    }

    function xoaTatCaHighlightCu() {
        tatCaLayerThuaDat.forEach(function(layer) {
            if (layer.options.originalStyle) {
                layer.setStyle(layer.options.originalStyle);
            }
        });
    }

    function highlightThuaDat(layer) {
        layer.setStyle({ color: '#ffff00', weight: 3.5, fillColor: '#ffff00', fillOpacity: 0.7 });
        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
            layer.bringToFront();
        }
    }

    // =========================================================================
    // 4. 🔒 KHỐI XÁC THỰC + SIÊU NHẬN DIỆN THIẾT BỊ VÀO CỘT F
    // =========================================================================
    var savedPhone = localStorage.getItem("sys_u_phone");
    var savedPass = localStorage.getItem("sys_u_pass");

    // Nếu chưa lưu tài khoản trên trình duyệt này -> Yêu cầu nhập
    if (!savedPhone || !savedPass) {
        savedPhone = prompt("Vui lòng nhập Số điện thoại đã đăng ký:", "");
        savedPass = prompt("Vui lòng nhập Mật khẩu:", "");

        if (savedPhone && savedPass) {
            savedPhone = savedPhone.trim();
            savedPass = savedPass.trim();
            localStorage.setItem("sys_u_phone", savedPhone);
            localStorage.setItem("sys_u_pass", savedPass);
        }
    }

    // A. Khởi tạo hoặc lấy Hardware Device ID duy nhất trên thiết bị này
    var deviceId = localStorage.getItem("sys_device_id");
    if (!deviceId) {
        deviceId = "DEV_" + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem("sys_device_id", deviceId);
    }

    // B. Hàm tổng hợp siêu thông tin thiết bị (Bỏ thông tin Lang)
    function getDetailedDeviceInfo() {
        var info = [];

        // 1. Hệ điều hành & Loại thiết bị (Mobile hay PC)
        var platform = navigator.platform || "N/A";
        if (navigator.userAgentData && navigator.userAgentData.platform) {
            platform = navigator.userAgentData.platform;
        }
        var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ? "Mobile" : "PC/Laptop";
        info.push(isMobile + " (" + platform + ")");

        // 2. Trình duyệt sử dụng
        var ua = navigator.userAgent;
        var browser = "Browser";
        if (ua.includes("Edg/")) browser = "Edge";
        else if (ua.includes("Chrome/")) browser = "Chrome";
        else if (ua.includes("Safari/") && !ua.includes("Chrome")) browser = "Safari";
        else if (ua.includes("Firefox/")) browser = "Firefox";
        else if (ua.includes("Zalo")) browser = "ZaloApp";
        info.push(browser);

        // 3. Độ phân giải màn hình & Tỉ lệ điểm ảnh
        var screenRes = window.screen.width + "x" + window.screen.height + " (" + window.devicePixelRatio + "x)";
        info.push("Màn: " + screenRes);

        // 4. Múi giờ hệ thống
        var timeZone = "N/A";
        try { timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone; } catch(e){}
        info.push("TZ: " + timeZone);

        // 5. Thông số Card đồ họa (GPU - Đầy đủ độ chi tiết phần cứng)
        try {
            var canvas = document.createElement("canvas");
            var gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
            if (gl) {
                var debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
                if (debugInfo) {
                    var renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    renderer = renderer.replace(/ANGLE \((.*)\)/, "$1").replace(/Direct3D11.*/, "").trim();
                    info.push("GPU: " + renderer);
                }
            }
        } catch(e){}

        return info.join(" | ");
    }

    var fullDeviceInfo = getDetailedDeviceInfo();

    // C. Gửi yêu cầu đăng nhập lên Server (Kèm theo device_id)
    var requestUrl = webAppUrl + "?phone=" + encodeURIComponent(savedPhone || "") 
                              + "&pass=" + encodeURIComponent(savedPass || "")
                              + "&device_id=" + encodeURIComponent(deviceId || "");

    fetch(requestUrl)
        .then(response => response.json())
        .then(res => {
            // Nếu bị Sai Mật khẩu / Tài khoản Bị Khóa / Đã Đăng nhập trên Máy khác -> Từ chối
            if (res.status === "error") {
                alert(res.message);
                localStorage.removeItem("sys_u_phone");
                localStorage.removeItem("sys_u_pass");
                document.getElementById("map").style.display = "none";
                return;
            }

            // D. Đăng nhập thành công -> Tiến hành đồng bộ Chuỗi thông tin thiết bị vào Cột F
            fetch(webAppUrl, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "register_device",
                    phone: savedPhone,
                    device_info: fullDeviceInfo,
                    device_id: deviceId
                })
            }).catch(e => console.log("Lỗi đồng bộ thiết bị:", e));

            // E. Vẽ danh sách các thửa đất lên bản đồ
            var plots = res.plots || [];
            tatCaLayerThuaDat = []; 

            plots.forEach(function(item) {
                if (!item.wkt) return;
                var coords = wktToCoords(item.wkt);
                var p = item.properties;
                var mauSac = getMauTheoLoaiDat(p.loai_dat);
                
                var polygon = L.polygon(coords, { 
                    color: mauSac.color, 
                    weight: 1.5, 
                    fillColor: mauSac.fillColor, 
                    fillOpacity: 0.45 
                }).addTo(map);

                polygon.options.originalStyle = { 
                    color: mauSac.color, 
                    weight: 1.5, 
                    fillColor: mauSac.fillColor, 
                    fillOpacity: 0.45 
                };
                polygon.customProperties = p; 
                tatCaLayerThuaDat.push(polygon); 

                var check = function(v) { return (v !== undefined && v !== null) ? v : ""; };

                // Nội dung Bảng thông tin khi bấm vào thửa đất
                var popupContent = "<table class='popup-table'>" +
                  "<tr><td><b>ID đất</b></td><td><span class='popup-value'>" + check(p.id_dat) + "</span></td></tr>" +
                  "<tr><td><b>Số tờ</b></td><td><span class='popup-value'>" + check(p.so_to) + "</span></td></tr>" +
                  "<tr><td><b>Số thửa</b></td><td><span class='popup-value'>" + check(p.so_thua) + "</span></td></tr>" +
                  "<tr><td><b>Diện tích</b></td><td>" + formatDienTich(p.dien_tich) + "</td></tr>" +
                  "<tr><td><b>Loại đất</b></td><td><span class='popup-value'><b>" + check(p.loai_dat) + "</b></span></td></tr>" +
                  "<tr><td><b>Tên chủ</b></td><td><span class='popup-value' title='" + check(p.ten_chu) + "'>" + check(p.ten_chu) + "</span></td></tr>" +
                  "<tr><td><b>Số định danh</b></td><td><span class='popup-value'>" + check(p.so_dinh_danh) + "</span></td></tr>" +
                  "<tr><td><b>Trạng thái</b></td><td><span class='popup-value'>" + check(p.trang_thai) + "</span></td></tr>" +
                  "<tr><td><b>Ngày tạo</b></td><td><span class='popup-value'>" + check(p.ngay_tao) + "</span></td></tr>" +
                  "<tr><td><b>Cập nhật</b></td><td><span class='popup-value'>" + check(p.ngay_cap_nhat) + "</span></td></tr>" +
                  "<tr><td><b>Ghi chú</b></td><td><span class='popup-value' title='" + check(p.ghi_chu) + "'>" + check(p.ghi_chu) + "</span></td></tr>" +
                  "</table>";

                polygon.bindPopup(popupContent, { maxWidth: 250 });

                polygon.on('click', function(e) {
                    xoaTatCaHighlightCu();
                    highlightThuaDat(polygon);
                });
            });

            map.on('popupclose', function() {
                xoaTatCaHighlightCu();
            });
        })
        .catch(error => console.error('Hệ thống gặp sự cố:', error));
    </script>
</body>
</html>
